
name: Deploy Application
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/datavault:${{ github.run_number }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/datavault:${{ github.run_number }}

      - name: Update deployment
        run: |
          kubectl apply -f kubernetes/namespace.yml
          kubectl create secret generic db-secret -n datavault --from-literal=MYSQL_ROOT_PASSWORD='{{ secrets.DB_PASSWORD }}' --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f kubernetes/configmap.yml
          kubectl apply -f kubernetes/service.yml
          kubectl apply -f kubernetes/db-service.yml
          kubectl apply -f kubernetes/statefulSet.yml
          kubectl apply -f kubernetes/deployment.yml
          kubectl set image deployment/datavault-app datavault-app=${{ secrets.DOCKER_USERNAME }}/datavault:${{ github.run_number}} --namespace=datavault

